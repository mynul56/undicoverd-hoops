name: Flutter CI

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend_flutter/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend_flutter/**'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend_flutter
    steps:
      - uses: actions/checkout@v3
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install Dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test
